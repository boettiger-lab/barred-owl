apiVersion: apps/v1
kind: Deployment
metadata:
  name: barred-owl
  namespace: biodiversity
  labels:
    app: barred-owl
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: barred-owl
  template:
    metadata:
      labels:
        app: barred-owl
    spec:
      initContainers:
      # Private-repo pattern: the GitHub repo (boettiger-lab/barred-owl) is
      # private, so the pod cannot git-clone at startup. App content is served
      # from the barred-owl-content ConfigMap instead. To update content:
      #   1. edit index.html / layers-input.json / system-prompt.md
      #   2. kubectl create configmap barred-owl-content -n biodiversity \
      #        --from-file=index.html --from-file=layers-input.json \
      #        --from-file=system-prompt.md --dry-run=client -o yaml \
      #        | kubectl apply -f -
      #   3. kubectl rollout restart -f k8s/deployment.yaml
      # (If the repo is later made public, revert to a git-clone init container.)
      - name: load-content
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          cp /content-src/index.html /content-src/layers-input.json \
             /content-src/system-prompt.md /usr/share/nginx/html/
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
        - name: app-content
          mountPath: /content-src
          readOnly: true
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: TMPDIR
          value: "/tmp"
        - name: MCP_SERVER_URL
          value: "https://duckdb-mcp.nrp-nautilus.io/mcp"
        - name: LLM_ENDPOINT
          value: "https://open-llm-proxy.nrp-nautilus.io/v1"
        - name: PROXY_KEY
          valueFrom:
            secretKeyRef:
              name: open-llm-proxy-secrets
              key: proxy-key
        command:
        - sh
        - -c
        - |
          apk add --no-cache gettext
          # Client-side config: no secrets, only ${MCP_SERVER_URL}
          envsubst '$${MCP_SERVER_URL}' < /config/config.template.json \
            > /usr/share/nginx/html/config.json
          # Server-side nginx config: substitutes ${PROXY_KEY} into the
          # Authorization header used by the /api/llm/ reverse proxy.
          # Limit envsubst to just ${PROXY_KEY} so nginx's own $uri /
          # $remote_addr style variables are left alone.
          envsubst '$${PROXY_KEY}' < /nginx-template/nginx.conf.template \
            > /etc/nginx/conf.d/default.conf
          nginx -g 'daemon off;'
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
        - name: nginx-template
          mountPath: /nginx-template
          readOnly: true
        - name: nginx-conf-d
          mountPath: /etc/nginx/conf.d
        - name: config-template
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: website-content
        emptyDir: {}
      - name: app-content
        configMap:
          name: barred-owl-content
      - name: config-template
        configMap:
          name: barred-owl-config
      - name: nginx-template
        configMap:
          name: barred-owl-nginx
      - name: nginx-conf-d
        emptyDir: {}
