apiVersion: apps/v1
kind: Deployment
metadata:
  name: barred-owl
  namespace: biodiversity
  labels:
    app: barred-owl
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: barred-owl
  template:
    metadata:
      labels:
        app: barred-owl
    spec:
      initContainers:
      # Public-repo pattern: the GitHub repo (boettiger-lab/barred-owl) is
      # public, so the pod git-clones the app content from main at startup.
      # To update content:
      #   1. edit index.html / layers-input.json / system-prompt.md / docs.html
      #   2. git commit && git push   (main is the live branch)
      #   3. kubectl rollout restart -f k8s/deployment.yaml
      # (If the repo is later made private again, revert to a ConfigMap-backed
      # load-content init container — see git history for the prior manifest.)
      - name: git-clone
        image: alpine/git:2.52.0
        command:
        - sh
        - -c
        - |
          git clone --depth 1 https://github.com/boettiger-lab/barred-owl.git /tmp/repo
          cp /tmp/repo/index.html /tmp/repo/layers-input.json \
             /tmp/repo/system-prompt.md /tmp/repo/docs.html /usr/share/nginx/html/
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: TMPDIR
          value: "/tmp"
        - name: MCP_SERVER_URL
          value: "https://duckdb-mcp.nrp-nautilus.io/mcp"
        - name: LLM_ENDPOINT
          value: "https://open-llm-proxy.nrp-nautilus.io/v1"
        - name: PROXY_KEY
          valueFrom:
            secretKeyRef:
              name: open-llm-proxy-secrets
              key: proxy-key
        command:
        - sh
        - -c
        - |
          apk add --no-cache gettext
          # Client-side config: no secrets, only ${MCP_SERVER_URL}
          envsubst '$${MCP_SERVER_URL}' < /config/config.template.json \
            > /usr/share/nginx/html/config.json
          # Server-side nginx config: substitutes ${PROXY_KEY} into the
          # Authorization header used by the /api/llm/ reverse proxy.
          # Limit envsubst to just ${PROXY_KEY} so nginx's own $uri /
          # $remote_addr style variables are left alone.
          envsubst '$${PROXY_KEY}' < /nginx-template/nginx.conf.template \
            > /etc/nginx/conf.d/default.conf
          # Pin worker_processes low: the base image defaults to
          # 'auto' (one worker per CPU), which spawns hundreds of
          # workers on large NRP nodes and OOM-kills the 256Mi limit.
          # -g can't override it (duplicate directive), so patch the
          # main config in place before launching.
          sed -i 's/^worker_processes.*/worker_processes 2;/' /etc/nginx/nginx.conf
          nginx -g 'daemon off;'
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
        - name: nginx-template
          mountPath: /nginx-template
          readOnly: true
        - name: nginx-conf-d
          mountPath: /etc/nginx/conf.d
        - name: config-template
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: website-content
        emptyDir: {}
      - name: config-template
        configMap:
          name: barred-owl-config
      - name: nginx-template
        configMap:
          name: barred-owl-nginx
      - name: nginx-conf-d
        emptyDir: {}
