apiVersion: v1
data:
  docs.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta
    name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>About
    — Barred Owl Prioritization (GLEN proof-of-concept)</title>\n<style>\n:root {\n
    \   --ink: #241c14;\n    --ink-soft: #5b4f43;\n    --paper: #faf7f2;\n    --rule:
    #e7dfd3;\n    --accent: #8a5a2b;\n    --accent-dark: #5e3c18;\n    --accent-soft:
    #f0e7da;\n    --link: #8a5a2b;\n    --max: 880px;\n}\n* { box-sizing: border-box;
    }\nhtml, body {\n    margin: 0; padding: 0;\n    background: var(--paper); color:
    var(--ink);\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\",
    system-ui, sans-serif;\n    font-size: 16px; line-height: 1.6;\n}\na { color:
    var(--link); text-decoration: none; }\na:hover { text-decoration: underline; }\nheader.hero
    {\n    background: linear-gradient(135deg, #3a2712 0%, var(--accent) 100%);\n
    \   color: #fff; padding: 3.5rem 1.5rem 2.5rem; border-bottom: 1px solid var(--rule);\n}\n.hero-inner
    { max-width: var(--max); margin: 0 auto; }\n.hero h1 { font-size: 2.1rem; margin:
    0 0 0.4rem 0; font-weight: 600; letter-spacing: -0.02em; }\n.hero .tag { font-size:
    1.05rem; opacity: 0.92; margin: 0 0 1.4rem 0; max-width: 62ch; }\n.hero .cta {\n
    \   display: inline-block; background: rgba(255,255,255,0.15); color: #fff;\n
    \   padding: 0.55rem 1.1rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.35);\n
    \   font-weight: 500; transition: background 0.15s;\n}\n.hero .cta:hover { background:
    rgba(255,255,255,0.28); text-decoration: none; }\n.hero .badge {\n    display:
    inline-block; margin-left: 0.6rem; padding: 0.18rem 0.55rem; border-radius: 999px;\n
    \   background: rgba(255,255,255,0.18); font-size: 0.8rem; font-weight: 500;\n
    \   letter-spacing: 0.02em; vertical-align: middle;\n}\nmain { max-width: var(--max);
    margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }\nsection { margin-bottom: 2.6rem;
    }\nh2 {\n    font-size: 1.45rem; color: var(--accent-dark); border-bottom: 2px
    solid var(--accent-soft);\n    padding-bottom: 0.4rem; margin: 0 0 1rem 0; font-weight:
    600;\n}\np { margin: 0.5rem 0 0.9rem; }\np.lede { font-size: 1.05rem; color: var(--ink-soft);
    }\n.callout {\n    background: #fff; border: 1px solid var(--rule); border-left:
    4px solid var(--accent);\n    border-radius: 8px; padding: 1rem 1.25rem; margin:
    1.1rem 0;\n}\nul { margin: 0.4rem 0 0.9rem; padding-left: 1.3rem; }\nli { margin:
    0.3rem 0; }\nfooter { max-width: var(--max); margin: 0 auto; padding: 1.5rem;
    color: var(--ink-soft); font-size: 0.9rem; border-top: 1px solid var(--rule);
    }\n</style>\n</head>\n<body>\n<header class=\"hero\">\n    <div class=\"hero-inner\">\n
    \       <h1>Barred Owl Prioritization Tool <span class=\"badge\">proof of concept</span></h1>\n
    \       <p class=\"tag\">An independent demonstration of exploring the Barred
    Owl Tool's data\n            through GLEN — an AI-assisted, cloud-native map interface.
    This is <strong>not</strong>\n            the official tool.</p>\n        <a class=\"cta\"
    href=\"/\">← Open the map</a>\n    </div>\n</header>\n<main>\n\n<section>\n    <h2>About
    this project</h2>\n    <p class=\"lede\">This is a <strong>proof-of-concept</strong>
    built by the\n        <a href=\"https://dse.berkeley.edu\">Eric and Wendy Schmidt
    Center for Data Science &amp;\n        Environment (DSE)</a> at UC Berkeley to
    explore the data behind the\n        <strong>Barred Owl Tool</strong> inside the
    GLEN architecture. It is not affiliated with,\n        endorsed by, or maintained
    by the tool's authors.</p>\n    <p>The Barred Owl Tool is a decision-support tool
    that prioritizes where to concentrate\n        invasive barred owl (<em>Strix
    varia</em>) population control to protect the northern\n        spotted owl (<em>Strix
    occidentalis caurina</em>), complementing the USFWS Barred Owl\n        Management
    Strategy. All of the science, modeling (via the Zonation algorithm), and the\n
    \       original interactive tool are the work of its authors — full credit and
    authority rest\n        with them.</p>\n\n    <div class=\"callout\">\n        <p
    style=\"margin-top:0\"><strong>Use the official tool.</strong> For authoritative\n
    \       results, methods, and guidance, please visit the original application
    and its\n        documentation:</p>\n        <ul>\n            <li><a href=\"https://barredowltool.russell.wisc.edu\">barredowltool.russell.wisc.edu</a>\n
    \               — the official Barred Owl Tool (Background, Methods, How-to guide)</li>\n
    \           <li><a href=\"https://www.fws.gov/project/barred-owl-management\">USFWS
    Barred Owl\n                Management</a> — the management strategy this tool
    supports</li>\n        </ul>\n        <p style=\"margin-bottom:0\">Coproduced
    by the University of Wisconsin–Madison\n        <a href=\"https://peery.russell.wisc.edu\">Peery
    Wildlife Ecology + Conservation Lab</a>\n        and the US Fish &amp; Wildlife
    Service, with support from\n        <a href=\"https://appliedsciences.nasa.gov/what-we-do/ecological-conservation\">NASA's\n
    \       Ecological Conservation</a> program.</p>\n    </div>\n\n    <p>This demo
    mirrors the tool's outputs into cloud-native formats and pairs them with an\n
    \       AI assistant. Because it re-processes and re-hosts the data, values or
    styling here may\n        differ from the official tool — treat this as an exploratory
    interface, not a source of\n        record.</p>\n</section>\n\n<section>\n    <h2>How
    it works</h2>\n    <p>This app is powered by <a href=\"https://boettiger-lab.github.io/geo-agent/\">GLEN</a>,\n
    \       DSE's open-source framework for AI-assisted geospatial exploration. Open
    datasets stream\n        straight to your browser from cloud-native formats —
    no tile server in between — and an\n        AI assistant answers questions by
    writing live queries against the same data. Technical\n        details are in
    the <a href=\"https://boettiger-lab.github.io/geo-agent/docs/\">GLEN\n        documentation</a>.</p>\n
    \   <p>\U0001F331 <strong>Low-carbon, open models.</strong> GLEN uses more environmentally-friendly
    AI\n        models — faster than most humans, if not the very largest commercial
    models. See the\n        <a href=\"https://carbon-dashboard.nrp-nautilus.io\">carbon
    dashboard \U0001F331</a> for the\n        CO₂/energy use of this deployment.</p>\n</section>\n\n<section>\n
    \   <h2>What you can do</h2>\n    <p>The map shows the tool's <strong>input layers</strong>
    — northern spotted owl carrying\n        capacity, pair occupancy and nest/roost
    habitat; barred owl occupancy; large-fire\n        suitability; fire refugia;
    and federal reserve allocation — each on the native ~5 km²\n        hex grid.
    The <strong>assistant</strong> can both drive the map and answer analytical\n
    \       questions over the Zonation <strong>priority scores</strong> for all 2,754
    management\n        scenarios (management unit × threat mode × tuning parameter
    × weight level). Try:</p>\n    <ul>\n        <li>\"Where is northern spotted owl
    carrying capacity highest?\"</li>\n        <li>\"For the range-wide current-threat
    scenario at high NSO weight, which 20 hexes rank highest?\"</li>\n        <li>\"Compare
    priority scores between the current-threat and future-threat scenarios.\"</li>\n
    \   </ul>\n</section>\n\n<section>\n    <h2>Data &amp; sources</h2>\n    <p>Data
    mirror:\n        <a href=\"https://radiantearth.github.io/stac-browser/#/external/s3-west.nrp-nautilus.io/public-barred-owl/stac-collection.json\">STAC\n
    \       collection</a> (<code>public-barred-owl</code>) — processed by the\n        <a
    href=\"https://github.com/boettiger-lab\">Boettiger Lab</a> from the\n        <a
    href=\"https://barredowltool.russell.wisc.edu\">Barred Owl Tool</a>.\n        Underlying
    inputs include NSO pair occupancy (Lesmeister et al.), spotted-owl nest/roost\n
    \       habitat (Davis et al. 2022), barred-owl landscape use (Jenkins et al.
    2025,\n        <em>J. Biogeography</em>), USGS GAP species, large-fire suitability
    (Davis et al. 2017),\n        OSU Eco-Vis fire refugia, and NWFP federal reserve
    allocations. See the official tool's\n        Methods page for full provenance.</p>\n</section>\n\n</main>\n<footer>\n
    \   A GLEN proof-of-concept by DSE / Boettiger Lab · Data &amp; original tool
    © their respective\n    authors · <a href=\"/\">Open the map →</a>\n</footer>\n</body>\n</html>\n"
  index.html: |
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Barred Owl Prioritization Tool</title>

        <!--
            Geo-Chat core modules loaded from CDN, pinned to a release tag.
            Bump the @vX.Y.Z pin deliberately (4 places below); never use @main
            in a deployed app. Third-party libraries carry Subresource Integrity
            (integrity=) hashes — copy this file verbatim and do NOT hand-edit a
            hash; a mismatched hash blocks the script. Hashes only change when a
            library version is bumped. See the geo-agent quickstart docs.
        -->
        <script type="importmap">
        {
            "imports": {
                "@modelcontextprotocol/sdk/client/index.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/index",
                "@modelcontextprotocol/sdk/client/streamableHttp.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/streamableHttp"
            }
        }
        </script>

        <!-- MapLibre GL JS -->
        <script src="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.js"
            integrity="sha384-U054LTKiMIJKEecR8PKFiUZdvkGWHjfPBnen5hSmR9TwfOfgZmKbskC8Rs9dCm/1"
            crossorigin="anonymous"></script>
        <link href="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.css" rel="stylesheet"
            integrity="sha384-MGCxhspF/+ufueUgol3FDkiAYQbpSNRhBT0VWHJt64U8qIy9qlnXWx8LAbj6niPH"
            crossorigin="anonymous" />

        <!-- PMTiles protocol -->
        <script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"
            integrity="sha384-MjejsnWXHmuz93aE35YWLh5AbS/6ceRB3Vb+ukOwqFzJRTpQ8vvbkLbNV7I0QK4f"
            crossorigin="anonymous"></script>

        <!-- h3-js (for hex grid overlay) -->
        <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"
            integrity="sha384-nKUDlg+fT0U/eEt4KWP9n034kLe/eVj6k7CVjbu6qfRhJdEyinlGajS9+9AU+UZ5"
            crossorigin="anonymous"></script>

        <!-- Markdown rendering (lib/marked.umd.js is the package-shipped artifact;
             marked.min.js is CDN-generated and unsafe to hash) -->
        <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"
            integrity="sha384-ZD0fTOwPMHi7zM6WTVIWJR21I07lq0ccnqz3J6WMvQKG9thh4y7TA1QE6PJu0Af8"
            crossorigin="anonymous"></script>

        <!-- HTML sanitizer — chat-ui.js refuses to render markdown without it -->
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.8/dist/purify.min.js"
            integrity="sha384-jrsBdrv4eDpEYIq32u13DPbvB6tRmqIDnA6UlgFBoexpetaiWi7g/VbfMEL1WVen"
            crossorigin="anonymous"></script>

        <!-- Code highlighting -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
            integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH"
            crossorigin="anonymous">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
            integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp"
            crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"
            integrity="sha384-8q00eP+tyV9451aJYD5ML3ftuHKsGnDcezp7EXMEclDg1fZVSoj8O+3VyJTkXmWp"
            crossorigin="anonymous"></script>

        <!-- Core styles from CDN -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@24020ac1/app/style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@24020ac1/app/chat.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@24020ac1/app/sidebar.css">
    </head>

    <body>
        <!-- Map -->
        <div id="map"></div>

        <!-- Layer controls — generated by MapManager.generateMenu() -->
        <div id="menu"></div>

        <!-- Boot from CDN -->
        <script type="module" src="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@24020ac1/app/main.js"></script>
    </body>

    </html>
  layers-input.json: |
    {
        "catalog": "https://s3-west.nrp-nautilus.io/public-data/stac/catalog.json",
        "titiler_url": "https://titiler.nrp-nautilus.io",
        "mcp_url": "https://duckdb-mcp.nrp-nautilus.io/mcp",
        "auto_approve": true,
        "geocoder": true,
        "geolocate": true,
        "sidebar": { "enabled": true, "chat_title": "Chat" },
        "links": { "docs": "/docs.html", "carbon": true },
        "view": { "center": [-122.3, 43.5], "zoom": 6 },
        "welcome": {
            "message": "Explore the Barred Owl Prioritization Tool for the northern spotted owl range. The map layers show the model INPUTS (owl occupancy, carrying capacity, fire risk, refugia). The Zonation priority SCORES for all 2,754 management scenarios live in a queryable table — just ask. Try:",
            "examples": [
                "Where is northern spotted owl carrying capacity highest?",
                "Show me barred owl occupancy across the range",
                "For the range-wide current-threat scenario at high NSO weight, which 20 hexes have the highest priority score?",
                "Compare priority scores between the current-threat and future-threat scenarios",
                "Which physiographic province has the most high-priority area?"
            ]
        },
        "collections": [
            {
                "collection_id": "barred-owl",
                "collection_url": "https://s3-west.nrp-nautilus.io/public-barred-owl/stac-collection.json",
                "group": "Barred Owl Tool — inputs",
                "assets": [
                    {
                        "id": "inputs-pmtiles",
                        "alias": "nso-ccap",
                        "display_name": "NSO carrying capacity (0–20)",
                        "visible": true,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "NSO_ccap"],
                                0, "#f7fbff", 5, "#9ecae1", 10, "#4292c6", 15, "#2171b5", 20, "#08306b"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "NSO_ccap", "NSO_occ", "BO_occ", "fire_suit", "fire_refu"]
                    },
                    {
                        "id": "inputs-pmtiles",
                        "alias": "bo-occ",
                        "display_name": "Barred owl occupancy (0–1)",
                        "visible": false,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "BO_occ"],
                                0, "#fff5f0", 0.25, "#fcae91", 0.5, "#fb6a4a", 0.75, "#de2d26", 1, "#67000d"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "BO_occ", "NSO_occ", "NSO_ccap"]
                    },
                    {
                        "id": "inputs-pmtiles",
                        "alias": "nso-occ",
                        "display_name": "NSO pair occupancy (0–1)",
                        "visible": false,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "NSO_occ"],
                                0, "#f7fcf5", 0.25, "#bae4b3", 0.5, "#74c476", 0.75, "#31a354", 1, "#00441b"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "NSO_occ", "NSO_hab", "NSO_ccap"]
                    },
                    {
                        "id": "inputs-pmtiles",
                        "alias": "nso-hab",
                        "display_name": "NSO nest/roost habitat (0–1)",
                        "visible": false,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "NSO_hab"],
                                0, "#fcfbfd", 0.25, "#dadaeb", 0.5, "#9e9ac8", 0.75, "#756bb1", 1, "#3f007d"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "NSO_hab", "NSO_occ", "NSO_ccap"]
                    },
                    {
                        "id": "inputs-pmtiles",
                        "alias": "fire-suit",
                        "display_name": "Large-fire suitability (0–100)",
                        "visible": false,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "fire_suit"],
                                0, "#ffffcc", 25, "#fed976", 50, "#fd8d3c", 75, "#e31a1c", 100, "#800026"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "fire_suit", "fire_refu", "fed_res"]
                    },
                    {
                        "id": "inputs-pmtiles",
                        "alias": "fire-refu",
                        "display_name": "Fire refugia (0–100)",
                        "visible": false,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "fire_refu"],
                                0, "#f7fcf0", 25, "#bae4bc", 50, "#7bccc4", 75, "#2b8cbe", 100, "#084081"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "fire_refu", "fire_suit", "fed_res"]
                    },
                    {
                        "id": "inputs-pmtiles",
                        "alias": "fed-res",
                        "display_name": "Federal reserve allocation (0–1)",
                        "visible": false,
                        "default_style": {
                            "fill-color": ["interpolate", ["linear"], ["get", "fed_res"],
                                0, "#f0f0f0", 0.5, "#bdbdbd", 1, "#238b45"],
                            "fill-opacity": 0.75
                        },
                        "tooltip_fields": ["HEXID", "fed_res", "NSO_ccap"]
                    }
                ]
            }
        ]
    }
  system-prompt.md: |
    You help people explore the **Barred Owl Prioritization Tool** — a decision-support
    product (UW–Madison Peery Lab + US Fish & Wildlife Service, NASA-funded) that uses the
    **Zonation** algorithm to prioritize where to concentrate invasive barred owl (*Strix
    varia*) population control to protect the northern spotted owl (*Strix occidentalis
    caurina*) across its range (western WA/OR, NW CA). It is a **decision-support tool, not
    a decision-making tool** — present results as model output, not policy recommendations.

    ## Discovering data

    Call `list_datasets` / `get_schema` for the `barred-owl` collection before writing SQL —
    they give exact S3 parquet paths, column definitions, and coded values. Do not guess
    column names, codes, or paths.

    ## The two artifacts — this is the key thing to get right

    The tool's output is normalized into two pieces, joined on **`HEXID`** (a native ~5 km²
    hex-grid id — a zero-padded string, **not** an H3 index):

    - **`inputs`** (the map layers + `inputs.parquet` / hex): the 7 input variables
      (`BO_occ`, `NSO_occ`, `NSO_hab`, `NSO_ccap`, `fed_res`, `fire_suit`, `fire_refu`).
      These are **identical across every scenario** — one row per hex.
    - **`scores.parquet`** (long, ~5.1M rows): the Zonation `prio_score` (0–1, higher =
      higher priority) for each of the **2,754 scenarios**. This is the only value that
      changes across scenarios.

    To answer "priority" questions, query `scores.parquet`; to describe habitat/threat
    conditions, use the inputs. Join them on `HEXID` when you need both.

    ## Scenario keys (must filter correctly or you mix scenarios)

    A scenario = `(unit_type, unit_id, mode, tune, scenario_id)`:
    - `unit_type`: `nwfp` (range-wide) · `phys_prov` (10 provinces) · `gma` (40 general
      management areas). For range-wide answers filter `unit_type='nwfp'`.
    - `mode`: `current_threat` · `future_threat` · `habitat`.
    - `tune`: which parameter is varied — `NSO`, `fire`, `reserve`, `road`, `trail`, `refugia`.
    - `scenario_id`: `Scenario 01/02/03` = **low/med/high** level of the *tuned* parameter.

    `prio_score` is **renormalized within each management unit**, so the same hex has a
    different score in the range-wide run vs. a province/GMA run — never compare scores
    across different `unit_type`/`unit_id` as if they were on one scale.

    ⚠️ `weight_col` reflects the **NSO** weight specifically (held at its high default on
    non-`NSO` tunes), so it does *not* identify a scenario on its own — use
    `(mode, tune, scenario_id)`.

    ## Aggregation pitfalls

    - On the **hex** asset each 5 km² source hex spans ~7 H3 res-8 cells, so input values
      are repeated. `NSO_ccap` is an extensive per-hex count (0–20) — **never SUM it on hex
      rows** (inflates ~7×); dedup by `HEXID` first, or use `inputs.parquet` (one row per hex).
    - `prio_score` may be NULL for masked cells — exclude NULLs before ranking/averaging.

    ## Style

    Prefer the map for "where" questions (the input layers are already loaded and styled by
    variable) and SQL for "how much / which / compare" questions. Attribute the data to the
    Barred Owl Tool (barredowltool.russell.wisc.edu) and the USFWS Barred Owl Management
    Strategy when describing sources. If a question needs data not in the catalog, say so
    and ask how to proceed rather than substituting an unrelated dataset.
